# cargo-deny configuration — dependency auditing (GOALS.md §6.6).
# Run: cargo deny check
# CI: fails on any advisory, license violation, or banned crate.
#
# cargo-deny 0.19+ uses the v2 config format. See:
# https://github.com/EmbarkStudios/cargo-deny/pull/611

[graph]
targets = []

[advisories]
# bincode 1.x unmaintained (RUSTSEC-2024-0436) — WAL uses bincode for
# frame serialization. Migration to bincode 2.x or postcard is Phase 4b
# work (WAL format v2). The advisory is informational, not a CVE.
# curve25519-dalek timing (RUSTSEC-2025-0141) — ed25519-dalek transitive
# dep. Non-exploitable in our use case (signing local datoms, not
# processing adversarial input in constant time).
ignore = ["RUSTSEC-2024-0436", "RUSTSEC-2025-0141"]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",    # bitmaps (transitive dep of im, ADR-FERR-001)
]
# asupersync workspace crates don't have Cargo.toml license fields yet
# but the repo has a LICENSE file (MIT). Exception until upstream fixes.
exceptions = [
    { allow = ["MIT"], crate = "asupersync" },
    { allow = ["MIT"], crate = "franken-decision" },
    { allow = ["MIT"], crate = "franken-evidence" },
    { allow = ["MIT"], crate = "franken-kernel" },
    { allow = ["MIT"], crate = "franken-runtime" },
]
# asupersync crates have LICENSE file but no Cargo.toml license field.
# Lower confidence threshold to accept file-based license detection.
confidence-threshold = 0.3

[bans]
multiple-versions = "warn"
wildcards = "allow"         # Workspace path deps use implicit wildcards
highlight = "all"
deny = [
    { crate = "openssl-sys" },
    { crate = "openssl" },
]

[sources]
unknown-registry = "deny"
unknown-git = "warn"        # asupersync is a git dependency
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://github.com/Dicklesworthstone/asupersync.git"]
